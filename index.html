<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>CABO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <h1>CABO</h1>
      <div id="status">Welcome</div>
    </header>

    <div id="table">
      <div id="opponents"></div>
      <div id="center">
        <div class="pile" id="drawPile">
          <div class="card back" id="drawCard"></div>
          <div class="pile-label">Draw <span id="drawCount"></span></div>
        </div>
        <div class="pile" id="discardPile">
          <div class="card empty" id="discardCard"></div>
          <div class="pile-label">Discard</div>
        </div>
      </div>
      <div id="humanArea">
        <div id="humanName" class="player-name">You</div>
        <div id="humanGrid" class="grid"></div>
      </div>
    </div>

    <div id="stackBarWrap"><div id="stackBar"></div></div>
    <div id="actionBar"></div>

    <aside id="logPanel">
      <div class="log-title">Table Notes</div>
      <div id="log"></div>
    </aside>
  </div>

  <!-- Modal overlay -->
  <div id="overlay" class="hidden">
    <div id="modal"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
